name: Release DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: Numeric app version
        required: true
        default: 0.4.0
      channel:
        description: Release channel
        required: true
        default: dev

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$P12_BASE64"
          test -n "$P12_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          KEYCHAIN="$RUNNER_TEMP/processgod-build.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Prepare App Store Connect key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          test -n "$ASC_PRIVATE_KEY"
          printf '%s' "$ASC_PRIVATE_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign, notarize, and validate
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-dmg.sh "${{ inputs.version }}" "${{ inputs.channel }}"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          TAG="v${VERSION}-${CHANNEL}"
          DMG="dist/processgod-mac-${VERSION}-${CHANNEL}.dmg"
          SHA_FILE="${DMG}.sha256"
          cat > "$RUNNER_TEMP/release-notes.md" <<NOTES
          Native Swift UI and Go guardian preview release.

          This DMG is Developer ID signed, notarized, stapled, and validated by GitHub Actions.

          SHA-256:
          \`\`\`
          $(cat "$SHA_FILE")
          \`\`\`
          NOTES

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "ProcessGodMac ${TAG}" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease
            gh release upload "$TAG" "$DMG" "$SHA_FILE" --clobber
          else
            gh release create "$TAG" "$DMG" "$SHA_FILE" \
              --target "$GITHUB_SHA" \
              --title "ProcessGodMac ${TAG}" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease
          fi
