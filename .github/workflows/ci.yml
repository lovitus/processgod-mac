name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go tests
        run: go test ./...
      - name: Swift tests
        run: make test-swift
      - name: Release build
        run: make build VERSION=0.4.0 CHANNEL=dev

